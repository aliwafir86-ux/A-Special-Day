<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Ali & Mujay - Modern Adat</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&family=Pinyon+Script&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* TEMA & DASAR */
        :root { --brown: #844204; --gold: #E67E22; --cream: #FFF5EC; }
        
        html { 
            scroll-snap-type: y proximity; 
            scroll-behavior: smooth;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Libre Baskerville', serif;
            background: var(--cream); 
            color: var(--brown);
            overflow: hidden;
        }

        section {
            height: 100vh; width: 100%;
            scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; text-align: center; padding: 40px 20px;
        }

        /* --- DESAIN AMPLOP MEMBELAH --- */
        #cover {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #fdfaf5;
            z-index: 3000;
            display: flex; flex-direction: column;
        }

        /* Garis Vertikal Halus di Background */
        #cover::before {
            content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
            width: 1px; background: rgba(132, 66, 4, 0.1); z-index: 1;
        }

        .envelope-top, .envelope-bottom {
            position: relative; width: 100%; height: 50vh;
            background-color: #fdfaf5;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            z-index: 5;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center;
        }

        /* Efek Shadow Belahan (Garis Membelah) */
        .envelope-top { 
            align-items: flex-end; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .envelope-bottom { 
            align-items: flex-start; 
            border-top: 1px solid rgba(255,255,255,0.8);
        }

        /* Teks Nama Vertikal (Membelah) */
        .vertical-text {
            position: absolute; left: 50%; transform: translateX(-50%);
            writing-mode: vertical-rl; text-orientation: mixed;
            font-size: 0.65rem; letter-spacing: 3px; color: #aaa;
            font-family: 'Montserrat', sans-serif; z-index: 2;
            text-transform: lowercase;
        }
        .v-top { bottom: 20px; } /* Di bagian atas amplop */
        .v-bottom { top: 20px; } /* Di bagian bawah amplop */

        .ribbon-line {
            width: 100%; height: 32px; background: #d39d7b;
            display: flex; justify-content: center; align-items: center;
            position: absolute; top: 50%; transform: translateY(-50%);
            z-index: 10; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ribbon-line::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            border-top: 2px dashed rgba(255,255,255,0.6);
            border-bottom: 2px dashed rgba(255,255,255,0.6);
        }

        .open-btn-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 12;
            transition: all 1.2s ease;
        }

        .circle-btn {
            width: 105px; height: 105px; background: #bc8665;
            border: 3px solid white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .circle-btn::after {
            content: ""; position: absolute; bottom: -18px;
            width: 35px; height: 35px; background: #bc8665;
            clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: -1;
        }

        .guest-box {
            position: absolute; top: 100px; /* Jarak dari belahan tengah */
            background: white; padding: 15px 30px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center; min-width: 240px; border: 1px solid #eee;
        }

        /* Trigger Animasi */
        .opened .envelope-top { transform: translateY(-100%); }
        .opened .envelope-bottom { transform: translateY(100%); }
        .opened .ribbon-line { transform: translateY(100vh); opacity: 0; }
        .opened .open-btn-container { opacity: 0; pointer-events: none; }
        .opened#cover { pointer-events: none; visibility: hidden; transition-delay: 1.2s; }

        /* SISA STYLE TETAP SAMA */
        .music-disk { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; background: #222; border-radius: 50%; display: none; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; border: 3px solid var(--gold); animation: spin 3s linear infinite; animation-play-state: paused; }
        .music-disk.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .hero-name { font-family: 'Pinyon Script', cursive; font-size: 5rem; color: var(--gold); margin: 10px 0; }
        .script-font { font-family: 'Pinyon Script', cursive; color: var(--gold); }
    </style>
</head>
<body>

    <section id="cover">
        <div class="envelope-top">
            <div class="vertical-text v-top">the wedding of ali and mujay</div>
        </div>
        
        <div class="ribbon-line"></div>
        
        <div class="open-btn-container">
            <div class="circle-btn" onclick="startInvitation()">
                <div style="font-family: 'Pinyon Script'; font-size: 1.3rem;">A &hearts; M</div>
                <span style="font-size: 0.65rem; font-family: 'Montserrat'; font-weight: bold; text-transform: uppercase;">Buka<br>Undangan</span>
            </div>
        </div>

        <div class="envelope-bottom">
            <div class="vertical-text v-bottom">the wedding of ali and mujay</div>
            <div class="guest-box">
                <p style="font-family: 'Montserrat'; font-size: 0.75rem; color: #888; margin-bottom: 5px;">Kepada Yth.</p>
                <div id="guestName" style="font-family: 'Libre Baskerville'; font-weight: bold; color: var(--gold);">Nama Tamu Undangan</div>
            </div>
        </div>
    </section>

    <div class="music-disk" id="musicBtn" onclick="toggleMusic()"></div>
    <audio id="bgMusic" loop><source src="musik.mp3" type="audio/mpeg"></audio>

    <section id="main-content" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('rings.jpg'); background-size: cover;">
        <p style="color: white; letter-spacing: 4px; font-family: 'Cinzel';">WEDDING INVITATION</p>
        <h1 class="hero-name">Ali & Mujay</h1>
    </section>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const guest = urlParams.get('to');
        if (guest) { document.getElementById('guestName').innerText = guest; }

        function startInvitation() {
            document.getElementById('cover').classList.add('opened');
            document.body.style.overflow = "auto";
            var audio = document.getElementById('bgMusic');
            audio.play().catch(() => {});
            document.getElementById('musicBtn').style.display = 'flex';
            document.getElementById('musicBtn').classList.add('playing');
            setTimeout(() => { document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' }); }, 1300);
        }

        function toggleMusic() {
            var audio = document.getElementById('bgMusic');
            var btn = document.getElementById('musicBtn');
            if (audio.paused) { audio.play(); btn.classList.add('playing'); } 
            else { audio.pause(); btn.classList.remove('playing'); }
        }
    </script>
</body>
</html>
